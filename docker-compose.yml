services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ticketera
      POSTGRES_USER:     ticketera
      POSTGRES_PASSWORD: ticketera
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ticketera"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ticketera:ticketera@postgres:5432/ticketera
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3

volumes:
  postgres_data:
