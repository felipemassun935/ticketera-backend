services:
  backend:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ticketera_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ticketera_data:
